
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sing up for Facebook |Facebook</title>
</head>
<body>
    <div class="container">
        <span class="box1">
            <img src="/fb.svg" alt="facebook img">
        </span>
        <span class="box2">
            <h1>Create a new account</h1>
            <p>It's quick and easy.</p>
            <hr>
            <form>
                <input type="text" placeholder="First name" required>
                <input type="text" placeholder="Surname" required>
                <br>
                <input type="number" placeholder="Mobile number or email address" required>
                <br>
                <input type="password" placeholder="New password" required>
                <br>
                <input type="date">
                <br>
                    Female<input type="radio" name="Gender">male<input type="radio" name="Gender">custom<input type="radio" name="Gender">
                    <p>
                        By clicking Sign Up, you agree to our <a href="#">Terms</a>, <a href="#">Data Policy</a> and <a href="#">Cookie Policy</a>. You may receive SMS notifications from us and can opt out at any time.
                    </p>
                    <br>
                    <button>Sign Up</button>
                    <br>
                    <a href="#">Already have an account?</a>
                </form>
        </span>
    </div>
    
</body>
</html>
